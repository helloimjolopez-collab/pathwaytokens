name: Sync SideNav-component.html

# Runs whenever SideNav.html is changed on main.
# Regenerates the stripped component-only file for Figma Make and
# commits it back to the repo automatically.

on:
  push:
    branches: [main]
    paths:
      - SideNav.html

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push the generated file back

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Regenerate SideNav-component.html
        run: python3 scripts/build-component.py

      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add SideNav-component.html
          if git diff --cached --quiet; then
            echo "No changes to SideNav-component.html — skipping commit."
          else
            git commit -m "chore: auto-sync SideNav-component.html from SideNav.html [skip ci]"
            git push
          fi
