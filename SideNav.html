<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SideNav — Pathway Design System</title>
<link href="https://fonts.googleapis.com/css2?family=Red+Hat+Text:wght@400;500;600;700&Red+Hat+Display:wght@600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  /* Surface/Canvas = #fafafa (same hex as Surface/Nav/Light — see token table) */
  html, body, #root { height: 100%; background: #fafafa; font-family: 'Red Hat Text', sans-serif; }
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 4px; }

  /* PopoverMenu animation — slides in 4px from left + fades in                    */
  /* Duration: 150ms ease-out on open. Close relies on 300ms hover-leave delay.    */
  /* prefers-reduced-motion: motion removed, opacity-only fade retained.           */
  /* popoverIn — for popovers that are top-aligned (no vertical centering transform) */
  @keyframes popoverIn {
    from { opacity: 0; transform: translateX(-4px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  /* popoverInCentered — for tooltips using translateY(-50%) vertical centering.     */
  /* Must bake the Y transform into both keyframes or the animation final state      */
  /* (forwards fill) overwrites the inline translateY(-50%) and breaks alignment.   */
  @keyframes popoverInCentered {
    from { opacity: 0; transform: translateX(-4px) translateY(-50%); }
    to   { opacity: 1; transform: translateX(0)    translateY(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    @keyframes popoverIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes popoverInCentered {
      from { opacity: 0; transform: translateY(-50%); }
      to   { opacity: 1; transform: translateY(-50%); }
    }
  }

  /* ── TOP NAV ───────────────────────────────────────────────── */
  /* Brand Colors/Dark Cerulean — Figma token */
  .unity-nav {
    position: fixed; top: 0; left: 0; right: 0;
    height: 64px; background: #0f3e80; z-index: 200;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 16px 0 8px; box-sizing: border-box;
  }

  /* ── RESPONSIVE LAYOUT ─────────────────────────────────────── */
  /* Overlay nav panel — always rendered when !isDesktop, CSS transitions
     drive both enter AND exit so there is no instant-removal flash.

     Asymmetric curves: the transition defined on .overlay-panel fires on EXIT
     (CSS uses the destination state's transition, so going back to the base
     class uses the base class transition). The transition on .overlay-panel--open
     fires on ENTER. This lets enter decelerate (glides in) and exit ease-in-out
     (leaves cleanly without the sharp reverse-curve snap of a shared transition).

     Enter: transform 380ms decelerate + opacity 300ms decelerate.
     Exit:  transform 300ms ease-in-out + opacity 220ms ease-in-out.           */
  .overlay-panel {
    position: fixed; left: 0; bottom: 0; z-index: 100;
    /* top:64 / width:overlayNavW(250) set via inline style (see App render)   */
    transform: translateX(-110%);   /* 110% hides any box-shadow bleed         */
    opacity: 0;
    pointer-events: none;           /* non-visible panel must not eat clicks    */
    /* EXIT transition — fires when .overlay-panel--open class is removed       */
    transition:
      transform 300ms cubic-bezier(0.4, 0, 0.6, 1),
      opacity   220ms cubic-bezier(0.4, 0, 0.6, 1);
    will-change: transform;
  }
  .overlay-panel--open {
    transform: translateX(0);
    opacity: 1;
    pointer-events: auto;
    /* ENTER transition — fires when .overlay-panel--open class is added        */
    transition:
      transform 380ms cubic-bezier(0, 0, 0.2, 1),
      opacity   300ms cubic-bezier(0, 0, 0.2, 1);
  }

  /* Scrim — all overlay breakpoints (<1024px, both tablet AND mobile).
     Overlay is 250px wide at all sizes, so page content is always partially
     visible behind it and the scrim is always needed. Always rendered when
     !isDesktop (not gated on isOverlay) so the CSS fade-out plays on dismiss —
     removing from the DOM on close would cause an instant vanish.             */
  .overlay-scrim {
    position: fixed; top: 64px; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.32); z-index: 99;
    opacity: 0;
    pointer-events: none;
    transition: opacity 280ms cubic-bezier(0.4, 0, 0.2, 1);
  }
  .overlay-scrim--visible {
    opacity: 1;
    pointer-events: auto;
  }

  @media (prefers-reduced-motion: reduce) {
    /* Remove slide — keep opacity fade only, shorter duration */
    .overlay-panel,
    .overlay-panel--open {
      transform: none !important;
      transition: opacity 150ms linear;
    }
    .overlay-scrim { transition: opacity 150ms linear; }
  }
</style>

// ─── IconImg ──────────────────────────────────────────────────────────────────
// Renders an icon from the IC object (real Pathway SVG paths).
// Uses fill={color} directly — no CDN or CSS filter hacks needed.
// Note: Figma CDN URLs (figma.com/api/mcp/asset/…) are NOT used here because:
//   • They expire after 7 days and require an active figma.com browser session.
//   • Re-colouring CDN <img> tags requires CSS filter approximations.
//   • The real SVG paths (extracted above from the Pathway design system) are
//     self-contained, colour-accurate at all states, and always available.
function IconImg({ name, size=14, color }) {
  const Ic = IC[name];
  return Ic ? <Ic size={size} color={color} /> : null;
}

// ─── INDICATOR STRIPE ─────────────────────────────────────────────────────────
// 4px structural column present on every SideNavItem (L0 + L1).
// indicator.stripe is visible only when `visible=true`.
// Color = Icon/Contextual/NavItem/Active (#3555a0) — same token as icon active.
function IndicatorStripe({ visible }) {
  return (
    <div style={{ width:L.stripeW, alignSelf:"stretch", display:"flex",
      flexDirection:"column", alignItems:"flex-start",
      justifyContent:"center", padding:"4px 0", flexShrink:0 }}>
      <div style={{ flex:"1 0 0", width:L.stripeW, minHeight:1,
        borderRadius:"0 8px 8px 0",
        backgroundColor: visible ? T.indicator : "transparent",
        transition:"background-color 0.15s ease" }}/>
    </div>
  );
}

// ─── SIDENAV ITEM ─────────────────────────────────────────────────────────────
// STATE MATRIX (confirmed from Figma):
//
// State                        Fill         Text         Icon         Stripe
// ─────────────────────────────────────────────────────────────────────────────
// Base                         NavItem/Base NavItem/Base NavItem/Base  –
// Hover                        NavItem/Hover NavItem/Hover NavItem/Hover  –
// Active (destination)         NavItem/Active NavItem/Active NavItem/Active ✓
// Trail — grouper EXPANDED     NavItem/Trail NavItem/Active NavItem/Base   –
//   ↳ any expanded grouper shows trail regardless of whether a child is active
// Trail — grouper COLLAPSED    NavItem/Active NavItem/Active NavItem/Active ✓
//   ↳ only when grouper has an active child AND is collapsed
//
// Level 0: [indicator 4px][LeadingIcon 24px][label flex][RowEnd 40×24 — groupers]
// Level 1: [indicator 4px][label flex pl-32]  (no icon, pl = rowStart 8 + main 24)
function SideNavItem({ item, isActive, isTrail, isExpanded, isSidebarCollapsed,
  isChild, onClick, onToggle, popoverOpen, anchorRect, onPopoverEnter, onPopoverLeave, activeId }) {

  const [hovered, setHovered] = useState(false);
  const hasChildren = !!(item.children && item.children.length);

  // Any expanded grouper → Trail state (regardless of active child)
  const isExpandedGrouper = hasChildren && isExpanded && !isSidebarCollapsed;
  // Collapsed grouper whose CHILD is active → trail state (bg fill + stripe)
  const isCollapsedActiveGrouper = isTrail && (!isExpanded || isSidebarCollapsed);

  // Stripe rules (Figma):
  //   Destination item active                       → stripe ✓
  //   Collapsed GROUPER directly active             → NO stripe (fill + icon colour only)
  //   Collapsed grouper with active child (trail)   → stripe ✓
  const isCollapsedGrouper = isSidebarCollapsed && hasChildren;
  const showStripe = isCollapsedActiveGrouper || (isActive && !isCollapsedGrouper);

  const fillBg =
    (isActive || isCollapsedActiveGrouper) ? T.fill.navActive
    : isExpandedGrouper                    ? T.fill.navTrail
    : hovered                              ? T.fill.navHover
    :                                        T.fill.navBase;

  // Trail text = Text/Contextual/NavItem/Active (same as active)
  const textColor =
    (isActive || isCollapsedActiveGrouper || isExpandedGrouper) ? T.text.navActive
    : hovered ? T.text.navHover
    :           T.text.navBase;

  // Trail-expanded icon = Icon/Contextual/NavItem/Base (#4b4b4b) per Figma
  const iconColor =
    (isActive || isCollapsedActiveGrouper) ? T.icon.navActive
    : hovered                              ? T.icon.navHover
    :                                        T.icon.navBase;

  const handleClick = () => {
    // Expanded sidebar: groupers toggle their children, destinations navigate.
    // Collapsed sidebar: groupers act as navigation targets — tapping a grouper
    // sets it Active (Figma: "When tapping on a grouper, the grouper moves to
    // its active state"). Popover remains hover-triggered separately.
    if (hasChildren && !isSidebarCollapsed) onToggle(item.id);
    else onClick(item.id);
  };

  const ChevComp = isExpanded ? IC.chevUp : IC.chevDown;
  const itemRef = useRef(null);

  return (
    <div ref={itemRef} style={{ position:"relative" }}>
      <div role="button" tabIndex={0} aria-current={isActive ? "page" : undefined}
        aria-expanded={hasChildren && !isSidebarCollapsed ? isExpanded : undefined}
        onClick={handleClick} onKeyDown={e => (e.key==="Enter"||e.key===" ") && handleClick()}
        onMouseEnter={() => {
          setHovered(true);
          if (isSidebarCollapsed && onPopoverEnter) {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : null;
            onPopoverEnter(item.id, rect);
          }
        }}
        onMouseLeave={() => {
          setHovered(false);
          if (isSidebarCollapsed && onPopoverLeave) onPopoverLeave();
        }}
        style={{ display:"flex", alignItems:"center", minHeight:L.itemH, width:"100%",
          borderRadius:T.radius, backgroundColor:fillBg, cursor:"pointer",
          overflow:"hidden", transition:"background-color 0.15s ease",
          userSelect:"none" }}>

        {/* container.indicator — 4px structural column, always present */}
        <IndicatorStripe visible={showStripe} />

        {/* Container.LeadingIcon 24×24 → Icon.Leading 14pt — Level 0 ONLY          */}
        {/* Collapsed: item is 48px wide (72px container − 12px padding × 2).        */}
        {/* 4px stripe + 8px rowStart padding + 24px icon + 8px rowStart = 44px      */}
        {/* icon naturally centers within the 48px item — no margin hack needed.     */}
        {!isChild && item.icon && (
          <div style={{ width:L.iconWrap, height:L.iconWrap, display:"flex",
            alignItems:"center", justifyContent:"center", flexShrink:0,
            marginLeft: L.rowPadH }}>
            <IconImg name={item.icon} size={L.iconInner} color={iconColor} />
          </div>
        )}

        {/* text.label — Label/Menu/Large/Medium (16px/500/22px) at ALL levels */}
        {/* L1: paddingLeft=32 = Container.rowStart px-[8] + container.main pl-[24] */}
        {/* Always in DOM; maxWidth+opacity transition prevents label pop-in glitch
            when expanding — text was previously mounting at full opacity inside the
            still-72px container before the width transition completed. */}
        <div style={{ flex:1, minWidth:0,
          paddingLeft:  isChild ? 32 : L.textPad,
          paddingRight: (!isChild && hasChildren) ? 0 : L.rowPadH,
          maxWidth: isSidebarCollapsed ? 0 : 200,
          opacity:  isSidebarCollapsed ? 0 : 1,
          overflow: "hidden",
          pointerEvents: isSidebarCollapsed ? "none" : "auto",
          transition:"max-width 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.18s ease" }}>
          <p style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:500,
            fontSize:16, lineHeight:"22px", color:textColor, margin:0,
            whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
            transition:"color 0.15s ease" }}>
            {item.label}
          </p>
        </div>

        {/* Container.RowEnd 40×24 — groupers only, expanded sidebar */}
        {/* Chevron: ▼ when collapsed, ▲ when expanded (vertical, not horizontal) */}
        {/* Always in DOM with same fade-out treatment to prevent layout jank */}
        {!isChild && hasChildren && (
          <div style={{ width:40, height:L.iconWrap, display:"flex",
            alignItems:"center", justifyContent:"center", flexShrink:0,
            maxWidth: isSidebarCollapsed ? 0 : 40,
            opacity:  isSidebarCollapsed ? 0 : 1,
            overflow: "hidden",
            transition:"max-width 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.18s ease" }}>
            <ChevComp size={10} color={iconColor} />
          </div>
        )}
      </div>

      {/* ── Hover-safe bridge ─────────────────────────────────────────────────── */}
      {/* position:fixed so it escapes the nav's overflow:hidden clipping.         */}
      {/* Covers the 8px gap between nav right edge and the portal-rendered popover */}
      {isSidebarCollapsed && popoverOpen && anchorRect && (
        <div style={{ position:"fixed",
          left: anchorRect.right, top: anchorRect.top,
          width:8, height: anchorRect.height, zIndex:999 }}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }} />
      )}

      {/* Collapsed grouper → flyout popover with section label + children */}
      {/* Rendered via portal so it escapes the nav's overflow:hidden stacking context */}
      {isSidebarCollapsed && hasChildren && popoverOpen && anchorRect && (
        <CollapsedPopover item={item} onClick={onClick} anchorRect={anchorRect}
          activeId={activeId}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }}
          onMouseLeave={onPopoverLeave} />
      )}

      {/* Collapsed destination → simple label tooltip */}
      {/* Rendered via portal so it escapes the nav's overflow:hidden stacking context */}
      {isSidebarCollapsed && !hasChildren && popoverOpen && anchorRect && (
        <CollapsedTooltip label={item.label} anchorRect={anchorRect}
          onMouseEnter={() => {
            const rect = itemRef.current ? itemRef.current.getBoundingClientRect() : anchorRect;
            onPopoverEnter && onPopoverEnter(item.id, rect);
          }}
          onMouseLeave={onPopoverLeave} />
      )}
    </div>
  );
}

// ── CollapsedTooltip ─────────────────────────────────────────────────────────
// Shown on hover of a collapsed destination item (non-grouper).
// Tokens: Fill/Static/Neutral/White, Stroke/Static/Neutral/Light (#f6f6f6),
//         Text/Static/Primary/Base (#252525), Text/Body/S/Regular (14px/400/20px)
// Shadow: 2px 2px 8px 0px rgba(0,0,0,0.03)
// Offset: left edge at container right edge + 8px gap (bridge element covers gap)
function CollapsedTooltip({ label, anchorRect, onMouseEnter, onMouseLeave }) {
  if (!anchorRect) return null;
  const top = anchorRect.top + anchorRect.height / 2;
  const left = anchorRect.right + 8;
  return ReactDOM.createPortal(
    <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
      style={{ position:"fixed", left, top,
        zIndex:1000,
        backgroundColor:"#fff",
        border:"0.5px solid #f6f6f6",
        borderRadius:8,
        boxShadow:"2px 2px 8px 0px rgba(0,0,0,0.03)",
        padding:"6px 8px",
        whiteSpace:"nowrap",
        pointerEvents:"auto",
        /* popoverInCentered bakes translateY(-50%) into both keyframes so the     */
        /* forwards fill never clobbers the vertical centering transform.          */
        animation:"popoverInCentered 150ms cubic-bezier(0,0,0.2,1) forwards" }}>
      <span style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:400,
        fontSize:14, lineHeight:"20px", letterSpacing:"0.02px",
        color:"#252525" }}>
        {label}
      </span>
    </div>,
    document.body
  );
}

// ── CollapsedPopover ─────────────────────────────────────────────────────────
// Shown on hover of a collapsed grouper item. Contains a SectionLabel (group
// name) + list of child items.
// Tokens: Fill/Static/Surface/White, Stroke/Static/Neutral/Subtle (#ededed) 0.5px,
//         Border/Radius/S (8px), Shadow.Medium (2px 2px 8px 4px rgba(0,0,0,0.03))
// Section label: Label/Menu/Base/Regular (14px/400/20px), #6b6b6b, bottom border
// Items: Text/Body/S/Regular (14px/400/20px), Text/Contextual/NavItem/Base (#363636)
// Offset: 8px from container right edge (bridge covers gap — see above)
function CollapsedPopover({ item, onClick, anchorRect, onMouseEnter, onMouseLeave, activeId }) {
  if (!anchorRect) return null;
  const top = anchorRect.top;
  const left = anchorRect.right + 8;
  return ReactDOM.createPortal(
    <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
      style={{ position:"fixed", left, top, zIndex:1000,
        backgroundColor:"#fff",
        border:"0.5px solid #ededed",
        borderRadius:8,
        boxShadow:"2px 2px 8px 4px rgba(0,0,0,0.03)",
        padding:6,
        minWidth:200,
        pointerEvents:"auto",
        animation:"popoverIn 150ms cubic-bezier(0,0,0.2,1) forwards" }}>

      {/* PopoverMenu.SectionLabel — group name with 4px left indicator slot + bottom divider */}
      <div style={{ display:"flex", alignItems:"center", minHeight:40,
        paddingRight:12, borderBottom:"0.5px solid #ededed", marginBottom:0 }}>
        <div style={{ width:4, alignSelf:"stretch", borderRadius:"0 8px 8px 0",
          backgroundColor:"transparent", flexShrink:0 }} />
        <span style={{ paddingLeft:8, fontFamily:"'Red Hat Text',sans-serif",
          fontWeight:400, fontSize:14, lineHeight:"20px", letterSpacing:"0.02px",
          color:"#6b6b6b", whiteSpace:"nowrap" }}>
          {item.label}
        </span>
      </div>

      {/* PopoverMenu.Items */}
      {item.children.map(child => <PopoverRow key={child.id} item={child} onClick={onClick} activeId={activeId} />)}
    </div>,
    document.body
  );
}

function PopoverRow({ item, onClick, activeId }) {
  const [h, setH] = useState(false);
  const isActive = item.id === activeId;
  // Active: fill navActive + stripe + text navActive color
  // Hover: fill navHover + text navHover
  // Base: transparent fill + text navBase
  const bg    = isActive ? T.fill.navActive : h ? T.fill.navHover : "transparent";
  const color = isActive ? T.text.navActive : h ? T.text.navHover : T.text.navBase;
  return (
    <div onClick={() => onClick(item.id)}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display:"flex", alignItems:"center",
        minHeight:40, borderRadius:8, overflow:"hidden",
        backgroundColor: bg, cursor:"pointer",
        transition:"background-color 0.15s ease" }}>
      {/* 4px indicator stripe — matches SideNavItem stripe */}
      <div style={{ width:4, alignSelf:"stretch", borderRadius:"0 4px 4px 0",
        backgroundColor: isActive ? T.indicator : "transparent",
        flexShrink:0, transition:"background-color 0.15s ease" }} />
      <span style={{ padding:"0 8px", fontFamily:"'Red Hat Text',sans-serif", fontWeight:400,
        fontSize:14, lineHeight:"20px", letterSpacing:"0.02px",
        color, transition:"color 0.15s ease", flex:1 }}>
        {item.label}
      </span>
    </div>
  );
}

// ─── COLLAPSE BUTTON ──────────────────────────────────────────────────────────
// Structure: container.rowStart pl-[12px] pr-[8px] → container.main [icon 24px][label]
// NO indicator stripe (differs from SideNavItem). NO Container.RowEnd chevron.
function CollapseButton({ isSidebarCollapsed, onToggle }) {
  const [h, setH] = useState(false);
  const colIconColor = h ? T.icon.navHover : T.icon.navBase;
  return (
    <div style={{ width:"100%" }}>
      {/* Divider: h-[1px] bg-Fill/Static/Info/Subtle (#edf0f9) */}
      <div style={{ height:1, backgroundColor:T.fill.infoSubtle, marginBottom:L.collapseGap }} />
      <div onClick={onToggle} onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
        aria-label={isSidebarCollapsed ? "Expand navigation" : "Collapse navigation"}
        role="button" tabIndex={0}
        onKeyDown={e => (e.key==="Enter"||e.key===" ") && onToggle()}
        style={{ display:"flex", alignItems:"center", minHeight:L.itemH, width:"100%",
          borderRadius:T.radius, backgroundColor: h ? T.fill.navHover : T.fill.navBase,
          cursor:"pointer", transition:"background-color 0.15s ease", overflow:"hidden" }}>
        <div style={{ display:"flex", flex:1, alignItems:"center",
          paddingLeft:L.colPadL, paddingRight:L.colPadR, height:"100%" }}>
          <div style={{ display:"flex", flex:1, alignItems:"center", minHeight:24 }}>
            <div style={{ width:L.iconWrap, height:L.iconWrap, display:"flex",
              alignItems:"center", justifyContent:"center", flexShrink:0 }}>
              <IconImg name={isSidebarCollapsed ? "expand" : "collapse"} size={18} color={colIconColor} />
            </div>
            {/* Always rendered — fades/shrinks out when collapsed so text doesn't
                pop in before the width transition completes on expand */}
            <span style={{ paddingLeft:L.textPad, paddingRight:L.textPad,
              fontFamily:"'Red Hat Text',sans-serif", fontWeight:500, fontSize:16,
              lineHeight:"22px", color: h ? T.text.navHover : T.text.navBase,
              transition:"color 0.15s ease, max-width 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.18s ease",
              maxWidth: isSidebarCollapsed ? 0 : 120,
              opacity:  isSidebarCollapsed ? 0 : 1,
              overflow: "hidden", whiteSpace: "nowrap",
              pointerEvents: isSidebarCollapsed ? "none" : "auto" }}>Collapse</span>
          </div>
        </div>
      </div>
    </div>
  );

// ─── SIDENAV CONTAINER ────────────────────────────────────────────────────────
// Surface/Nav/Light (#fafafa), border-r Fill/Static/Info/Subtle (#edf0f9)
// Padding: px-[12px] py-[14px] (no semantic tokens — Figma gap)
// Width: 250px expanded, 72px collapsed — Figma: 72px (12px padding × 2 + 48px item)
// Border-right: 0.5px (--border-width/xs) solid Fill/Static/Info/Subtle (#edf0f9)
//
// Props:
//   activeId          — id of the currently active nav item
//   onNavigate        — called with item id when user navigates
//   sidebarCollapsed  — true = 72px icon-only rail; false = 250px expanded
//   onCollapseChange  — called with new boolean value when collapse state changes
//   hideCollapseButton— when true, the Collapse_Expand_Nav_Container is not rendered.
//                       Set to true on mobile (<768px) where there is no 72px rail
//                       state — the TopNav hamburger/close is the sole toggle.
function SideNav({ activeId, onNavigate, sidebarCollapsed, onCollapseChange, hideCollapseButton }) {
  const setSidebarCollapsed = onCollapseChange;
  const [expanded, setExpanded] = useState({ view: true });
  const [popoverId, setPopoverId] = useState(null);
  const [popoverRect, setPopoverRect] = useState(null);
  const timerRef = useRef(null);

  const trailParentId = (() => {
    const p = NAV.find(item => item.children && item.children.some(c => c.id === activeId));
    return p ? p.id : null;
  })();

  const toggleExpand = id => setExpanded(p => ({ ...p, [id]: !p[id] }));
  const onPopoverEnter = (id, rect) => {
    clearTimeout(timerRef.current);
    setPopoverId(id);
    if (rect) setPopoverRect(rect);
  };
  // 300ms close delay — generous enough for motor-impaired users (WCAG 2.5.1).
  // Combined with the invisible bridge element on each item, users can move
  // freely from nav item to popover without triggering a close.
  const onPopoverLeave = () => { timerRef.current = setTimeout(() => { setPopoverId(null); setPopoverRect(null); }, 300); };

  return (
    <nav style={{
      // Width tokens: none in Figma — raw values
      width: sidebarCollapsed ? L.navWcol : L.navW,
      // height:100% fills the body area (viewport − 64px topnav) exactly.
      // minHeight:100vh was causing the nav to overflow its container and the
      // CollapseButton — positioned at the flex-column bottom — to be clipped
      // by the parent's overflow:hidden.
      height:"100%",
      // Surface/Nav/Light
      backgroundColor: T.surface.navLight,
      display:"flex", flexDirection:"column",
      // Padding: px-[12px] py-[14px] — no spacing tokens in Figma
      padding:`${L.navPadV}px ${L.navPadH}px`,
      boxSizing:"border-box", flexShrink:0,
      transition:"width 0.36s cubic-bezier(0.4,0,0.2,1)",
      // stroke/static/info/subtle = Fill/Static/Info/Subtle
      // Border-width/xs token = 0.5px (Figma: --border-width/xs)
      borderRight:`0.5px solid ${T.fill.infoSubtle}`,
      overflowY:"auto",
    }}>
      {/* SideNavMenu: gap-[8px] between items, pb-[24px] */}
      <div style={{ display:"flex", flexDirection:"column", flex:1, gap:L.menuGap }}>
        {NAV.map(item => {
          const hasChildren = !!(item.children && item.children.length);
          const isActive   = item.id === activeId;
          const isTrail    = item.id === trailParentId;
          const isExpanded = !!expanded[item.id];
          return (
            <div key={item.id}>
              <SideNavItem item={item} isActive={isActive} isTrail={isTrail}
                isExpanded={isExpanded} isSidebarCollapsed={sidebarCollapsed}
                isChild={false} onClick={onNavigate} onToggle={toggleExpand}
                popoverOpen={popoverId === item.id}
                anchorRect={popoverId === item.id ? popoverRect : null}
                onPopoverEnter={onPopoverEnter} onPopoverLeave={onPopoverLeave}
                activeId={activeId} />

              {/* Level 1 children — visible only when grouper expanded + sidebar expanded */}
              {hasChildren && isExpanded && !sidebarCollapsed && (
                <div style={{ display:"flex", flexDirection:"column", gap:L.menuGap, marginTop:2 }}>
                  {item.children.map(child => (
                    <SideNavItem key={child.id} item={child}
                      isActive={child.id === activeId} isTrail={false}
                      isExpanded={false} isSidebarCollapsed={false}
                      isChild={true} onClick={onNavigate} onToggle={() => {}} />
                  ))}
                </div>
              )}
            </div>
          );
        })}

        {/* Spacer pushes collapse button to bottom */}
        <div style={{ flex:1 }} />

        {/* ⚠️ REQUIRED: Collapse_Expand_Nav_Container — ALWAYS IN DOM.
            Always rendered. Hidden ONLY on mobile (<768px) via display:none.
            At ALL ≥768px breakpoints in BOTH states:
              - Expanded (250px): shows collapse_nav icon + "Collapse" label
              - Collapsed (72px): shows expand_nav icon, label hidden (no room)
            Sits at the bottom of the nav list (pushed down by flex:1 spacer above).
            Does NOT have an indicator.stripe column. Uses pl-[12px] not px-[8px]. */}
        <div style={{ paddingTop:L.collapseGap, display: hideCollapseButton ? "none" : "block" }}>
          <CollapseButton isSidebarCollapsed={sidebarCollapsed}
            onToggle={() => setSidebarCollapsed(!sidebarCollapsed)} />
        </div>
      </div>
    </nav>
  );
}

  return (

// ─── APP ──────────────────────────────────────────────────────────────────────
// Responsive layout — three breakpoint zones:
//
//  ≥1024px  DESKTOP   push layout    SideNav is in-flow (expanded 250px or collapsed 72px)
//                                    TopNav: position:fixed (height 64px)
//                                    Body area: marginTop:64, left by SideNav width
//
//  768–1023px TABLET  overlay layout SideNav slides over content (250px wide, 72px collapsed)
//                                    TopNav: position:fixed
//                                    Scrim (rgba 0,0,0,0.32) shown behind overlay
//                                    Collapse button on overlay nav → collapses back to 72px rail
//
//  <768px   MOBILE    hidden + full overlay
//                                    SideNav hidden by default (hamburger icon in TopNav)
//                                    Opening → 250px overlay drawer (same width as tablet)
//                                    NO 72px collapsed state on mobile (hover/popover patterns
//                                    don't apply to touch devices; screen width too narrow)
//                                    TopNav: position:relative (in-flow, not fixed)
//                                    Closing overlay → nav fully hidden again (not collapsed)
//
// Animation strategy (CSS transitions on .overlay-panel / .overlay-scrim):
//   Always keep overlay panel + tablet scrim in the DOM when !isDesktop.
//   Toggle .overlay-panel--open / .overlay-scrim--visible via CSS class.
//   This lets the EXIT transition play — conditional rendering would unmount
//   the element immediately, giving an instant-removal flash with no exit.
function App() {
  const [activeId, setActiveId] = useState("balance_sheet");

  // Compute correct initial values synchronously before first render.
  // window.innerWidth is available immediately in a browser context.
  const initW = window.innerWidth;
  const [sidebarCollapsed, setSidebarCollapsed] = useState(initW < 1024);
  const [navHidden,         setNavHidden]        = useState(initW < 768);
  const [viewportW,         setViewportW]        = useState(initW);

  // Resize listener — updates viewportW on every resize event.
  useEffect(() => {
    const onResize = () => setViewportW(window.innerWidth);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  }, []);

  // When viewport crosses a breakpoint boundary, snap to correct defaults.
  // Uses a ref to compare old vs new breakpoint so a pixel-nudge within the
  // same zone does NOT override the user's manual collapse/expand choice.
  const bpOf = w => w >= 1024 ? 2 : w >= 768 ? 1 : 0; // 2=desktop 1=tablet 0=mobile
  const prevBp = useRef(bpOf(initW));
  useEffect(() => {
    const bp = bpOf(viewportW);
    if (bp === prevBp.current) return;
    prevBp.current = bp;
    if (bp === 2) { setNavHidden(false); setSidebarCollapsed(false); }       // desktop → expanded
    else if (bp === 1) { setNavHidden(false); setSidebarCollapsed(true); }   // tablet  → collapsed rail
    else              { setNavHidden(true);  setSidebarCollapsed(true); }    // mobile  → hidden (hamburger ≡ default)
  }, [viewportW]);

  const isDesktop   = viewportW >= 1024; // SideNav layout: push vs overlay
  const isNavDesktop= viewportW >= 768;  // TopNav variant: full bar vs mobile
  const isMobile    = viewportW < 768;   // full-width overlay + hamburger control
  const isTablet    = viewportW >= 768 && viewportW < 1024; // overlay + scrim, no hamburger

  // Overlay mode: <1024px AND nav is not hidden AND expanded
  const isOverlay = !isDesktop && !navHidden && !sidebarCollapsed;

  const handleHamburger = () => {
    // Hamburger/close control only active on mobile (<768px)
    if (!isMobile) return;
    if (navHidden) {
      // Open: show as full-width overlay (sidebarCollapsed=false → isOverlay=true)
      setNavHidden(false);
      setSidebarCollapsed(false);
    } else {
      // Close: hide nav and reset to collapsed
      setNavHidden(true);
      setSidebarCollapsed(true);
    }
  };

  const handleNavigate = (id) => {
    setActiveId(id);
    // Mobile: close the full-screen overlay after navigation so the page is visible.
    // Tablet: keep the 250px overlay open — content is visible beside the nav,
    //         so there's no need to force-close on every navigation.
    if (isMobile && !sidebarCollapsed) { setSidebarCollapsed(true); setNavHidden(true); }
  };

  const all    = NAV.flatMap(item => item.children ? [item, ...item.children] : [item]);
  const active = all.find(i => i.id === activeId);
  const parent = NAV.find(i => i.children && i.children.some(c => c.id === activeId));
  const PageIconSource = NAV.find(i => i.id === activeId) || parent;
  const pageIconName = PageIconSource && PageIconSource.icon;

  // Overlay nav width: 250px at all breakpoints — consistent drawer width.
  // Even on a 393px phone, 250px leaves a 143px scrim strip to tap outside.
  // Full-width overlays feel like modals and destroy context; 250px is industry
  // standard (Gmail, Slack, WhatsApp all use ~260–320px drawers on phone).
  const overlayNavW = 250;

  return (
    <div style={{ display:"flex", flexDirection:"column", height:"100vh",
      overflow:"hidden", background:"#f0f1f4" }}>

      {/* ── GLOBAL TOP NAV ── fixed, always on top ─────────────────────── */}
      <TopNav
        isNavDesktop={isNavDesktop}
        navHidden={navHidden}
        onHamburgerClick={handleHamburger}
      />

      {/* ── BODY AREA ── below top nav ──────────────────────────────────── */}
      {/* marginTop:64 only when TopNav is position:fixed (≥768px).
          On mobile (<768px) TopNav overrides to position:relative (in-flow),
          so no margin needed — the 64px height is consumed naturally in the flex column. */}
      <div style={{ display:"flex", flex:1, overflow:"hidden",
        marginTop: isNavDesktop ? 64 : 0, position:"relative" }}>

        {/* ── SCRIM — all overlay breakpoints (tablet + mobile) ──────────── */}
        {/* Shown at all non-desktop breakpoints whenever the overlay is open.
            On mobile (<768px) the nav is 250px wide, leaving a 143px+ strip of
            page content visible — the scrim dims it and provides a tap target
            to dismiss. Always rendered when !isDesktop (not conditional on
            isOverlay) so the CSS fade-out transition plays on close.           */}
        {!isDesktop && (
          <div
            onClick={() => {
              setSidebarCollapsed(true);
              if (isMobile) setNavHidden(true); // mobile: tap scrim → back to hamburger
            }}
            className={isOverlay ? "overlay-scrim overlay-scrim--visible" : "overlay-scrim"}
          />
        )}

        {/* ── OVERLAY SIDENAV — tablet + mobile ───────────────────────────── */}
        {/* Always rendered when !isDesktop so the CSS transition can slide it
            OUT when the overlay closes. The --open class drives enter/exit.
            top:64 is correct for BOTH tablet (TopNav fixed) and mobile (TopNav
            in-flow at 64px) — the overlay starts right below the TopNav in
            both cases. width:overlayNavW is 250px at all overlay breakpoints. */}
        {!isDesktop && (
          <div
            className={isOverlay ? "overlay-panel overlay-panel--open" : "overlay-panel"}
            style={{ top: 64, width: overlayNavW }}>
            <SideNav activeId={activeId} onNavigate={handleNavigate}
              sidebarCollapsed={false}
              hideCollapseButton={isMobile}
              onCollapseChange={v => {
                if (v) {
                  setSidebarCollapsed(true);
                  // Mobile: pressing collapse goes back to hidden (hamburger ≡),
                  // not to 72px collapsed rail (which doesn't exist on mobile).
                  if (isMobile) setNavHidden(true);
                }
              }} />
          </div>
        )}

        {/* Desktop or collapsed (in-flow) SideNav */}
        {isDesktop ? (
          <SideNav activeId={activeId} onNavigate={setActiveId}
            sidebarCollapsed={sidebarCollapsed}
            onCollapseChange={setSidebarCollapsed} />
        ) : (
          // ⚠️ REQUIRED: Tablet in-flow collapsed rail — DO NOT OMIT OR HIDE.
          // isTablet = viewport 768–1023px. At this breakpoint the SideNav is a
          // 72px icon-only rail that sits IN the page layout flow (not an overlay).
          // It is visible BY DEFAULT — not hidden, not triggered by a button.
          // Content fills the remaining width to the right of the 72px rail.
          // This is NOT mobile behaviour. Do not treat 768–1023px as mobile.
          isTablet && !navHidden && sidebarCollapsed && (
            <SideNav activeId={activeId} onNavigate={handleNavigate}
              sidebarCollapsed={true}
              onCollapseChange={v => { if(!v) setSidebarCollapsed(false); }} />
          )
        )}

        {/* ── RIGHT COLUMN ── scrollable ──────────────────────────────── */}
        <div style={{ flex:1, overflowY:"auto", display:"flex", flexDirection:"column",
          /* When overlay is open on mobile, content scrolls but is covered */
          minWidth:0 }}>

        {/* ════════════════════════════════════════════════════════════════
            ZONE 1 — DEMO SCREEN
            This simulates the actual app page. The heading + breadcrumb
            update as you navigate the SideNav on the left.
            ════════════════════════════════════════════════════════════════ */}
        <div style={{ background:"#fafafa", borderBottom:"2px solid #edf0f9" }}>

          {/* App top-bar */}
          <div style={{ height:52, display:"flex", alignItems:"center",
            borderBottom:"1px solid #edf0f9", padding:"0 32px",
            background:"#fff", gap:8 }}>
            {/* Breadcrumb */}
            <span style={{ fontSize:12, color:"#c0c0c0", fontFamily:"'Red Hat Text',sans-serif" }}>
              Accounting
            </span>
            <span style={{ fontSize:12, color:"#d4d4d4" }}>›</span>
            {parent && <>
              <span style={{ fontSize:12, color:"#aaa", fontFamily:"'Red Hat Text',sans-serif" }}>
                {parent.label}
              </span>
              <span style={{ fontSize:12, color:"#d4d4d4" }}>›</span>
            </>}
            <span style={{ fontSize:12, fontWeight:500, color:"#4b4b4b",
              fontFamily:"'Red Hat Text',sans-serif" }}>
              {active ? active.label : "—"}
            </span>
            {/* Demo badge — always visible so users know this is a prototype */}
            <div style={{ marginLeft:"auto", display:"flex", alignItems:"center", gap:6,
              padding:"4px 12px", borderRadius:20, background:"#f0f4ff",
              border:"1px solid #c7d3f5" }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:"#3555a0" }} />
              <span style={{ fontSize:10, fontWeight:700, color:"#3555a0",
                letterSpacing:"0.07em", textTransform:"uppercase",
                fontFamily:"'Red Hat Text',sans-serif" }}>
                Interactive demo
              </span>
            </div>
          </div>

          {/* Page content area */}
          <div style={{ padding:"32px 32px 36px" }}>
            {/* Page heading */}
            <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:28 }}>
              {pageIconName && (
                <div style={{ width:44, height:44, borderRadius:11, flexShrink:0,
                  background:"rgba(53,85,160,0.08)", display:"flex",
                  alignItems:"center", justifyContent:"center" }}>
                  <IconImg name={pageIconName} size={20} color={T.icon.navActive} />
                </div>
              )}
              <div>
                <h1 style={{ fontSize:22, fontWeight:600, color:"#02060d", margin:0,
                  fontFamily:"'Red Hat Text',sans-serif", lineHeight:"28px" }}>
                  {active ? active.label : "—"}
                </h1>
                {parent && (
                  <p style={{ fontSize:13, color:"#999", margin:"3px 0 0",
                    fontFamily:"'Red Hat Text',sans-serif" }}>
                    {parent.label}
                  </p>
                )}
              </div>
            </div>

            {/* Empty content cards — represent the page content area */}
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              <div style={{ display:"flex", gap:12 }}>
                {["Summary", "Details", "History"].map(label => (
                  <div key={label} style={{ flex:1, background:"#fff", borderRadius:10,
                    border:"1px dashed #d8dce8", padding:"24px 20px",
                    display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", gap:6, minHeight:88 }}>
                    <span style={{ fontSize:18, color:"#dde0ea" }}>□</span>
                    <span style={{ fontSize:11, color:"#c4c8d8",
                      fontFamily:"'Red Hat Text',sans-serif" }}>{label}</span>
                  </div>
                ))}
              </div>
              <div style={{ background:"#fff", borderRadius:10,
                border:"1px dashed #d8dce8", padding:"24px 20px",
                display:"flex", alignItems:"center", justifyContent:"center", minHeight:80 }}>
                <span style={{ fontSize:12, color:"#c4c8d8",
                  fontFamily:"'Red Hat Text',sans-serif" }}>Content area</span>
              </div>
            </div>
          </div>
        </div>

        {/* @COMPONENT_ONLY_END — generator cuts here for SideNav-component.html */}
        {/* ════════════════════════════════════════════════════════════════
            DIVIDER — makes the transition from demo to docs unmistakable
            ════════════════════════════════════════════════════════════════ */}
        <div style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 32px",
          background:"#e8eaf0", borderBottom:"1px solid #d8dae4",
          borderTop:"1px solid #d8dae4", position:"sticky", top:0, zIndex:10 }}>
          <div style={{ flex:1, height:1, background:"#c8cad6" }} />
          <span style={{ fontSize:12, fontWeight:700, color:"#7880a0",
            letterSpacing:"0.12em", textTransform:"uppercase", whiteSpace:"nowrap",
            fontFamily:"'Red Hat Text',sans-serif" }}>
            Component Documentation
          </span>
          <div style={{ flex:1, height:1, background:"#c8cad6" }} />
        </div>

        {/* ════════════════════════════════════════════════════════════════
            ZONE 2 — ANNOTATIONS / SPECIFICATIONS
            ════════════════════════════════════════════════════════════════ */}
        <div style={{ padding:"32px 32px 56px", display:"flex", flexDirection:"column", gap:28,
          background:"#f0f1f4" }}>

          {/* shared styles */}
          {(() => {
            const SH = { fontSize:10, fontWeight:700, color:"#7880a0", textTransform:"uppercase",
              letterSpacing:"0.1em", margin:"0 0 12px", fontFamily:"'Red Hat Text',sans-serif" };
            const CARD = { background:"transparent", borderRadius:12, padding:"20px 24px",
              border:"1px solid #dde0ee", width:"100%" };
            const BODY = { fontSize:13, color:"#4b4b4b", margin:0,
              fontFamily:"'Red Hat Text',sans-serif", lineHeight:"20px",
              wordBreak:"break-word", overflowWrap:"anywhere" };
            const SUB = { fontSize:12, color:"#8890b0",
              fontFamily:"'Red Hat Text',sans-serif", lineHeight:"18px" };
            const GH = { fontSize:12, fontWeight:700, color:"#4b4b4b", margin:"0 0 10px",
              fontFamily:"'Red Hat Text',sans-serif", textTransform:"uppercase",
              letterSpacing:"0.06em" };
            const CD = { fontFamily:"monospace", fontSize:12, color:"#3555a0",
              background:"rgba(53,85,160,0.07)", padding:"1px 5px", borderRadius:3,
              whiteSpace:"nowrap" };
            const KBD = { background:"#e8eaf0", border:"1px solid #c4c8d6", borderRadius:3,
              padding:"1px 6px", fontFamily:"monospace", fontSize:12, color:"#2a2d3a" };
            const Row = ({ic, children, last}) => (
              <div style={{ display:"flex", gap:12, padding:"10px 0",
                borderBottom: last ? "none" : "1px solid #edf0f9", alignItems:"flex-start" }}>
                {ic}
                <p style={BODY}>{children}</p>
              </div>
            );
            return (
              <>
                {/* ── Spec link ── */}
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                  gap:16, background:"transparent", border:"1px solid #dde0ee",
                  borderRadius:12, padding:"18px 24px", flexWrap:"wrap" }}>
                  <div>
                    <p style={{ fontSize:13, fontWeight:600, color:"#02060d", margin:"0 0 3px",
                      fontFamily:"'Red Hat Text',sans-serif" }}>SideNav — Component Spec</p>
                    <p style={{ fontSize:12, color:"#8890b0", margin:0,
                      fontFamily:"'Red Hat Text',sans-serif" }}>
                      Tokens · anatomy · states · keyboard · ARIA · screen reader strings · Figma gaps
                    </p>
                  </div>
                  <a href="https://github.com/helloimjolopez-collab/pathwaytokens/blob/main/SideNav-spec.md"
                    target="_blank" rel="noopener"
                    style={{ display:"inline-flex", alignItems:"center", gap:6,
                      padding:"6px 14px", borderRadius:6, background:"transparent",
                      border:"1px solid #c0c8d6", color:"#3555a0",
                      fontSize:14, fontWeight:500, lineHeight:"20px",
                      textDecoration:"none", fontFamily:"'Red Hat Text',sans-serif",
                      whiteSpace:"nowrap", flexShrink:0 }}>
                    View full spec →
                  </a>
                </div>

                {/* ── State Logic ── */}
                <section>
                  <p style={SH}>State Logic</p>
                  <div style={{...CARD, overflowX:"auto"}}>
                    <p style={{...SUB, marginBottom:16}}>Click nav items to cycle through states in the demo above.</p>
                    <div style={{ minWidth:460 }}>
                    {[
                      { label:"Base",                      fill:T.fill.navBase,   stripe:false, desc:"Resting — Fill/Contextual/NavItem/Base" },
                      { label:"Hover",                     fill:T.fill.navHover,  stripe:false, desc:"Fill/Contextual/NavItem/Hover" },
                      { label:"Active destination",        fill:T.fill.navActive, stripe:true,  desc:"Active fill + Icon/Contextual/NavItem/Active + indicator stripe" },
                      { label:"Trail — grouper expanded",  fill:T.fill.navTrail,  stripe:false, desc:"Any expanded grouper — Trail fill, Text/Active, Icon/Base, no stripe" },
                      { label:"Trail — grouper collapsed", fill:T.fill.navActive, stripe:true,  desc:"Collapsed grouper with active child — Active fill + stripe" },
                    ].map(({ label, fill, stripe, desc }, idx, arr) => (
                      <div key={label} style={{ display:"flex", alignItems:"center", gap:16,
                        padding:"11px 0", borderBottom: idx < arr.length-1 ? `1px solid ${T.fill.infoSubtle}` : "none" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
                          <div style={{ width:4, height:24, borderRadius:"0 4px 4px 0",
                            backgroundColor: stripe ? T.indicator : "#e4e6ef" }} />
                          <div style={{ width:96, height:24, borderRadius:5, backgroundColor:fill,
                            border:"1px solid rgba(0,0,0,0.07)", flexShrink:0 }} />
                        </div>
                        <div style={{ minWidth:0 }}>
                          <p style={{ fontWeight:600, fontSize:13, color:"#2a2d3a", margin:"0 0 2px",
                            fontFamily:"'Red Hat Text',sans-serif" }}>{label}</p>
                          <p style={{...SUB, margin:0}}>{desc}</p>
                        </div>
                      </div>
                    ))}
                    </div>
                  </div>
                </section>

                {/* ── Token & Layout Reference ── */}
                <section>
                  <p style={SH}>Token &amp; Layout Reference</p>
                  <div style={{...CARD, overflowX:"auto"}}>
                    <p style={{...SUB, marginBottom:16}}>
                      Primitive names are not surfaced by the <span style={CD}>get_variable_defs</span> Figma MCP tool — it resolves alias chains to final hex values only.
                      Rows marked <strong>no token</strong> have no semantic spacing tokens in Figma.
                    </p>
                    <div style={{ overflowX:"auto" }}>
                      <table style={{ width:"100%", borderCollapse:"collapse",
                        fontFamily:"'Red Hat Text',sans-serif", minWidth:680 }}>
                        <thead>
                          <tr>
                            {["Category","Semantic Token","Primitive","Value","Role"].map(h => (
                              <th key={h} style={{ textAlign:"left", padding:"8px 12px",
                                background:"#f4f5f8", fontWeight:700, fontSize:11,
                                color:"#8890b0", textTransform:"uppercase", letterSpacing:"0.06em",
                                borderBottom:"2px solid #e4e6f0", whiteSpace:"nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {TOKEN_ROWS.map(({ cat, semantic, prim, value, role }) => {
                            const isWarn = cat.startsWith("⚠");
                            const isGood = cat.startsWith("✓");
                            const rowBg = isWarn ? "rgba(245,158,11,0.04)" : isGood ? "rgba(34,197,94,0.03)" : "transparent";
                            return (
                              <tr key={semantic} style={{ backgroundColor:rowBg }}>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color: isWarn ? "#b07800" : isGood ? "#166534" : "#777",
                                  whiteSpace:"nowrap", verticalAlign:"top" }}>{cat}</td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color: isWarn ? "#b07800" : isGood ? "#166534" : "#3555a0",
                                  verticalAlign:"top" }}>{semantic}</td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color:"#999", verticalAlign:"top" }}>{prim}</td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontFamily:"monospace", fontSize:12, color:"#333", verticalAlign:"top",
                                  whiteSpace:"nowrap" }}>
                                  <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                                    {value.startsWith("#") && (
                                      <div style={{ width:13, height:13, borderRadius:3, flexShrink:0,
                                        backgroundColor:value, border:"1px solid rgba(0,0,0,0.1)" }} />
                                    )}
                                    {value}
                                  </div>
                                </td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color:"#666", verticalAlign:"top" }}>{role}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </section>

                {/* ── Typography Token ── */}
                <section>
                  <p style={SH}>Typography Token</p>
                  <div style={{...CARD, maxWidth:620, overflowX:"auto"}}>
                    <div style={{ marginBottom:16, display:"flex", alignItems:"baseline",
                      gap:10, flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"monospace", fontSize:13, color:"#3555a0",
                        background:"rgba(53,85,160,0.08)", padding:"3px 10px", borderRadius:4 }}>
                        Label/Menu/L/Medium
                      </span>
                      <span style={{...SUB}}>— all nesting levels, no size variation</span>
                    </div>
                    {[
                      ["--label/menu/l/medium/fontfamily",    "'Red Hat Text', sans-serif"],
                      ["--label/menu/l/medium/fontweight",    "500 (Medium)"],
                      ["--label/menu/l/medium/fontsize",      "16px"],
                      ["--label/menu/l/medium/lineheight",    "22px"],
                      ["--label/menu/l/medium/letterspacing", "0px"],
                    ].map(([varName, val], i, arr) => (
                      <div key={varName} style={{ display:"flex", alignItems:"baseline",
                        gap:16, padding:"9px 0",
                        borderBottom: i < arr.length-1 ? "1px solid #edf0f9" : "none",
                        flexWrap:"wrap" }}>
                        <code style={{ fontFamily:"monospace", fontSize:12, color:"#3555a0",
                          flexShrink:0 }}>{varName}</code>
                        <span style={{ fontSize:13, color:"#4b4b4b",
                          fontFamily:"'Red Hat Text',sans-serif" }}>{val}</span>
                      </div>
                    ))}
                  </div>
                </section>

              </>
            );
          })()}

        </div>{/* end annotations zone */}
        </div>{/* end right column */}
      </div>{/* end body area */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
