// ─── IconImg ──────────────────────────────────────────────────────────────────
// Renders an icon from the IC object (real Pathway SVG paths).
// Uses fill={color} directly — no CDN or CSS filter hacks needed.
// Note: Figma CDN URLs (figma.com/api/mcp/asset/…) are NOT used here because:
//   • They expire after 7 days and require an active figma.com browser session.
//   • Re-colouring CDN <img> tags requires CSS filter approximations.
//   • The real SVG paths (extracted above from the Pathway design system) are
//     self-contained, colour-accurate at all states, and always available.
function IconImg({ name, size=14, color }) {
  const Ic = IC[name];
  return Ic ? <Ic size={size} color={color} /> : null;
}

// ─── INDICATOR STRIPE ─────────────────────────────────────────────────────────
// 4px structural column present on every SideNavItem (L0 + L1).
// indicator.stripe is visible only when `visible=true`.
// Color = Icon/Contextual/NavItem/Active (#3555a0) — same token as icon active.
function IndicatorStripe({ visible }) {
  return (
    <div style={{ width:L.stripeW, alignSelf:"stretch", display:"flex",
      flexDirection:"column", alignItems:"flex-start",
      justifyContent:"center", padding:"4px 0", flexShrink:0 }}>

// ─── SIDENAV ITEM ─────────────────────────────────────────────────────────────
// STATE MATRIX (confirmed from Figma):
//
// State                        Fill         Text         Icon         Stripe
// ─────────────────────────────────────────────────────────────────────────────
// Base                         NavItem/Base NavItem/Base NavItem/Base  –
// Hover                        NavItem/Hover NavItem/Hover NavItem/Hover  –
// Active (destination)         NavItem/Active NavItem/Active NavItem/Active ✓
// Trail — grouper EXPANDED     NavItem/Trail NavItem/Active NavItem/Base   –
//   ↳ any expanded grouper shows trail regardless of whether a child is active
// Trail — grouper COLLAPSED    NavItem/Active NavItem/Active NavItem/Active ✓
//   ↳ only when grouper has an active child AND is collapsed
//
// Level 0: [indicator 4px][LeadingIcon 24px][label flex][RowEnd 40×24 — groupers]
// Level 1: [indicator 4px][label flex pl-32]  (no icon, pl = rowStart 8 + main 24)
function SideNavItem({ item, isActive, isTrail, isExpanded, isSidebarCollapsed,
  isChild, onClick, onToggle, popoverOpen, onPopoverEnter, onPopoverLeave }) {

  const [hovered, setHovered] = useState(false);
  const hasChildren = !!(item.children && item.children.length);

  // Any expanded grouper → Trail state (regardless of active child)
  const isExpandedGrouper = hasChildren && isExpanded && !isSidebarCollapsed;
  // Collapsed grouper with active child → Active state + stripe
  const isCollapsedActiveGrouper = isTrail && (!isExpanded || isSidebarCollapsed);

  const showStripe  = isActive || isCollapsedActiveGrouper;

  const fillBg =
    (isActive || isCollapsedActiveGrouper) ? T.fill.navActive
    : isExpandedGrouper                    ? T.fill.navTrail
    : hovered                              ? T.fill.navHover
    :                                        T.fill.navBase;

  // Trail text = Text/Contextual/NavItem/Active (same as active)
  const textColor =
    (isActive || isCollapsedActiveGrouper || isExpandedGrouper) ? T.text.navActive
    : hovered ? T.text.navHover
    :           T.text.navBase;

  // Trail-expanded icon = Icon/Contextual/NavItem/Base (#606060) per Figma
  const iconColor =
    (isActive || isCollapsedActiveGrouper) ? T.icon.navActive
    : hovered                              ? T.icon.navHover
    :                                        T.icon.navBase;

  const handleClick = () => {
    if (hasChildren && !isSidebarCollapsed) onToggle(item.id);
    else if (!hasChildren) onClick(item.id);
  };

  const ChevComp = isExpanded ? IC.chevUp : IC.chevDown;

  return (
    <div style={{ position:"relative" }}>
      <div role="button" tabIndex={0} aria-current={isActive ? "page" : undefined}
        aria-expanded={hasChildren && !isSidebarCollapsed ? isExpanded : undefined}
        onClick={handleClick} onKeyDown={e => (e.key==="Enter"||e.key===" ") && handleClick()}
        onMouseEnter={() => {
          setHovered(true);
          if (isSidebarCollapsed && hasChildren && onPopoverEnter) onPopoverEnter(item.id);
        }}
        onMouseLeave={() => {
          setHovered(false);
          if (isSidebarCollapsed && hasChildren && onPopoverLeave) onPopoverLeave();
        }}
        style={{ display:"flex", alignItems:"center", minHeight:L.itemH, width:"100%",
          borderRadius:T.radius, backgroundColor:fillBg, cursor:"pointer",
          overflow:"hidden", transition:"background-color 0.15s ease",
          userSelect:"none" }}>

        {/* container.indicator — 4px structural column, always present */}
        <IndicatorStripe visible={showStripe} />

        {/* Container.LeadingIcon 24×24 → Icon.Leading 14pt — Level 0 ONLY */}
        {!isChild && item.icon && (
          <div style={{ width:L.iconWrap, height:L.iconWrap, display:"flex",
            alignItems:"center", justifyContent:"center", flexShrink:0,
            marginLeft: isSidebarCollapsed ? 7 : 4 }}>
            <IconImg name={item.icon} size={L.iconInner} color={iconColor} />
          </div>
        )}

        {/* text.label — Label/Menu/Large/Medium (16px/500/22px) at ALL levels */}
        {/* L1: paddingLeft=32 = Container.rowStart px-[8] + container.main pl-[24] */}
        {!isSidebarCollapsed && (
          <div style={{ flex:1, minWidth:0,
            paddingLeft:  isChild ? 32 : L.textPad,
            paddingRight: (!isChild && hasChildren) ? 0 : L.rowPadH }}>
            <p style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:500,
              fontSize:16, lineHeight:"22px", color:textColor, margin:0,
              whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis",
              transition:"color 0.15s ease" }}>
              {item.label}
            </p>
          </div>
        )}

        {/* Container.RowEnd 40×24 — groupers only, expanded sidebar */}
        {/* Chevron: ▼ when collapsed, ▲ when expanded (vertical, not horizontal) */}
        {!isSidebarCollapsed && !isChild && hasChildren && (
          <div style={{ width:40, height:L.iconWrap, display:"flex",
            alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            <ChevComp size={10} color={iconColor} />
          </div>
        )}
      </div>

      {/* Collapsed sidebar flyout popover */}
      {isSidebarCollapsed && hasChildren && popoverOpen && (
        <CollapsedPopover item={item} onClick={onClick}
          onMouseEnter={() => onPopoverEnter && onPopoverEnter(item.id)}
          onMouseLeave={onPopoverLeave} />
      )}
    </div>
  );
}

function CollapsedPopover({ item, onClick, onMouseEnter, onMouseLeave }) {
  return (
    <div onMouseEnter={onMouseEnter} onMouseLeave={onMouseLeave}
      style={{ position:"absolute", left:"calc(100% + 8px)", top:0, zIndex:200,
        backgroundColor:"#fff", borderRadius:10,
        boxShadow:"0 4px 20px rgba(0,0,0,0.12)", padding:4, minWidth:188 }}>
      <p style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:600, fontSize:11,
        color:"#9a9a9a", textTransform:"uppercase", letterSpacing:"0.08em",
        padding:"8px 12px 4px", margin:0 }}>{item.label}</p>
      {item.children.map(child => <PopoverRow key={child.id} item={child} onClick={onClick} />)}
    </div>
  );
}

function PopoverRow({ item, onClick }) {
  const [h, setH] = useState(false);
  return (
    <div onClick={() => onClick(item.id)}
      onMouseEnter={() => setH(true)} onMouseLeave={() => setH(false)}
      style={{ display:"flex", alignItems:"center", padding:"10px 12px", borderRadius:6,
        backgroundColor: h ? T.fill.navHover : "transparent",
        cursor:"pointer", transition:"background-color 0.15s ease" }}>
      <span style={{ fontFamily:"'Red Hat Text',sans-serif", fontWeight:500,
        fontSize:16, lineHeight:"22px",
        color: h ? T.text.navHover : T.text.navBase, transition:"color 0.15s ease" }}>
        {item.label}
      </span>
    </div>
  );
}

// ─── COLLAPSE BUTTON ──────────────────────────────────────────────────────────
// Structure: container.rowStart pl-[12px] pr-[8px] → container.main [icon 24px][label]
// NO indicator stripe (differs from SideNavItem). NO Container.RowEnd chevron.
function CollapseButton({ isSidebarCollapsed, onToggle }) {

        onKeyDown={e => (e.key==="Enter"||e.key===" ") && onToggle()}
        style={{ display:"flex", alignItems:"center", minHeight:L.itemH, width:"100%",

        <div style={{ display:"flex", flex:1, alignItems:"center",
          paddingLeft:L.colPadL, paddingRight:L.colPadR, height:"100%" }}>
          <div style={{ display:"flex", flex:1, alignItems:"center", minHeight:24 }}>

              alignItems:"center", justifyContent:"center", flexShrink:0 }}>

                lineHeight:"22px", color: h ? T.text.navHover : T.text.navBase,
                transition:"color 0.15s ease" }}>Collapse</span>
            )}
          </div>
        </div>
      </div>
    </div>
  );
}

// ─── SIDENAV CONTAINER ────────────────────────────────────────────────────────
// Surface/Nav/Light (#fafafa), border-r Fill/Static/Info/Subtle (#edf0f9)
// Padding: px-[12px] py-[14px] (no semantic tokens — Figma gap)
// Width: 250px expanded, 64px collapsed (no semantic tokens — Figma gap)
function SideNav({ activeId, onNavigate }) {
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [expanded, setExpanded] = useState({ view: true });
  const [popoverId, setPopoverId] = useState(null);
  const timerRef = useRef(null);

  const trailParentId = (() => {
    const p = NAV.find(item => item.children && item.children.some(c => c.id === activeId));
    return p ? p.id : null;
  })();

  const toggleExpand = id => setExpanded(p => ({ ...p, [id]: !p[id] }));
  const onPopoverEnter = id => { clearTimeout(timerRef.current); setPopoverId(id); };
  const onPopoverLeave = () => { timerRef.current = setTimeout(() => setPopoverId(null), 120); };

  return (
    <nav style={{
      // Width tokens: none in Figma — raw values
      width: sidebarCollapsed ? L.navWcol : L.navW,
      minHeight:"100vh",
      // Surface/Nav/Light
      backgroundColor: T.surface.navLight,
      display:"flex", flexDirection:"column",
      // Padding: px-[12px] py-[14px] — no spacing tokens in Figma
      padding:`${L.navPadV}px ${L.navPadH}px`,
      boxSizing:"border-box", flexShrink:0,
      transition:"width 0.25s cubic-bezier(0.4,0,0.2,1)",
      // stroke/static/info/subtle = Fill/Static/Info/Subtle
      borderRight:`1px solid ${T.fill.infoSubtle}`,
      overflowY:"auto", overflowX:"hidden",
    }}>
      {/* SideNavMenu: gap-[8px] between items, pb-[24px] */}
      <div style={{ display:"flex", flexDirection:"column", flex:1, gap:L.menuGap }}>
        {NAV.map(item => {
          const hasChildren = !!(item.children && item.children.length);
          const isActive   = item.id === activeId;
          const isTrail    = item.id === trailParentId;
          const isExpanded = !!expanded[item.id];
          return (
            <div key={item.id}>
              <SideNavItem item={item} isActive={isActive} isTrail={isTrail}
                isExpanded={isExpanded} isSidebarCollapsed={sidebarCollapsed}
                isChild={false} onClick={onNavigate} onToggle={toggleExpand}
                popoverOpen={popoverId === item.id}
                onPopoverEnter={onPopoverEnter} onPopoverLeave={onPopoverLeave} />

              {/* Level 1 children — visible only when grouper expanded + sidebar expanded */}
              {hasChildren && isExpanded && !sidebarCollapsed && (
                <div style={{ display:"flex", flexDirection:"column", gap:L.menuGap, marginTop:2 }}>
                  {item.children.map(child => (
                    <SideNavItem key={child.id} item={child}
                      isActive={child.id === activeId} isTrail={false}
                      isExpanded={false} isSidebarCollapsed={false}
                      isChild={true} onClick={onNavigate} onToggle={() => {}} />
                  ))}
                </div>
              )}
            </div>
          );
        })}

        {/* Spacer pushes collapse button to bottom */}
        <div style={{ flex:1 }} />

        {/* Collapse_Expand_Nav_Container: pt-[4px] gap-[4px] */}
        <div style={{ paddingTop:L.collapseGap }}>
          <CollapseButton isSidebarCollapsed={sidebarCollapsed}
            onToggle={() => setSidebarCollapsed(v => !v)} />
        </div>
      </div>
    </nav>
  );
}

            {/* Page heading */}
            <div style={{ display:"flex", alignItems:"center", gap:14, marginBottom:28 }}>
              {pageIconName && (
                <div style={{ width:44, height:44, borderRadius:11, flexShrink:0,
                  background:"rgba(53,85,160,0.08)", display:"flex",
                  alignItems:"center", justifyContent:"center" }}>
                  <IconImg name={pageIconName} size={20} color={T.icon.navActive} />
                </div>
              )}
              <div>
                <h1 style={{ fontSize:22, fontWeight:600, color:"#02060d", margin:0,
                  fontFamily:"'Red Hat Text',sans-serif", lineHeight:"28px" }}>
                  {active ? active.label : "—"}
                </h1>
                {parent && (
                  <p style={{ fontSize:13, color:"#999", margin:"3px 0 0",
                    fontFamily:"'Red Hat Text',sans-serif" }}>
                    {parent.label}
                  </p>
                )}
              </div>
            </div>

            {/* Empty content cards — represent the page content area */}
            <div style={{ display:"flex", flexDirection:"column", gap:12 }}>
              <div style={{ display:"flex", gap:12 }}>
                {["Summary", "Details", "History"].map(label => (
                  <div key={label} style={{ flex:1, background:"#fff", borderRadius:10,
                    border:"1px dashed #d8dce8", padding:"24px 20px",
                    display:"flex", flexDirection:"column", alignItems:"center",
                    justifyContent:"center", gap:6, minHeight:88 }}>
                    <span style={{ fontSize:18, color:"#dde0ea" }}>□</span>
                    <span style={{ fontSize:11, color:"#c4c8d8",
                      fontFamily:"'Red Hat Text',sans-serif" }}>{label}</span>
                  </div>
                ))}
              </div>
              <div style={{ background:"#fff", borderRadius:10,
                border:"1px dashed #d8dce8", padding:"24px 20px",
                display:"flex", alignItems:"center", justifyContent:"center", minHeight:80 }}>
                <span style={{ fontSize:12, color:"#c4c8d8",
                  fontFamily:"'Red Hat Text',sans-serif" }}>Content area</span>
              </div>
            </div>
          </div>
        </div>

        {/* ════════════════════════════════════════════════════════════════
            DIVIDER — makes the transition from demo to docs unmistakable
            ════════════════════════════════════════════════════════════════ */}
        <div style={{ display:"flex", alignItems:"center", gap:14, padding:"14px 32px",
          background:"#e8eaf0", borderBottom:"1px solid #d8dae4",
          borderTop:"1px solid #d8dae4", position:"sticky", top:0, zIndex:10 }}>
          <div style={{ flex:1, height:1, background:"#c8cad6" }} />
          <span style={{ fontSize:10, fontWeight:700, color:"#7880a0",
            letterSpacing:"0.12em", textTransform:"uppercase", whiteSpace:"nowrap",
            fontFamily:"'Red Hat Text',sans-serif" }}>
            Component Documentation
          </span>
          <div style={{ flex:1, height:1, background:"#c8cad6" }} />
        </div>

        {/* ════════════════════════════════════════════════════════════════
            ZONE 2 — ANNOTATIONS / SPECIFICATIONS
            ════════════════════════════════════════════════════════════════ */}
        <div style={{ padding:"32px 32px 56px", display:"flex", flexDirection:"column", gap:28,
          background:"#f0f1f4" }}>

          {/* shared styles */}
          {(() => {
            const SH = { fontSize:12, fontWeight:700, color:"#7880a0", textTransform:"uppercase",
              letterSpacing:"0.1em", margin:"0 0 12px", fontFamily:"'Red Hat Text',sans-serif" };
            const CARD = { background:"transparent", borderRadius:12, padding:"20px 24px",
              border:"1px solid #dde0ee", width:"100%" };
            const BODY = { fontSize:13, color:"#4b4b4b", margin:0,
              fontFamily:"'Red Hat Text',sans-serif", lineHeight:"20px",
              wordBreak:"break-word", overflowWrap:"anywhere" };
            const SUB = { fontSize:12, color:"#8890b0",
              fontFamily:"'Red Hat Text',sans-serif", lineHeight:"18px" };
            const GH = { fontSize:12, fontWeight:700, color:"#4b4b4b", margin:"0 0 10px",
              fontFamily:"'Red Hat Text',sans-serif", textTransform:"uppercase",
              letterSpacing:"0.06em" };
            const CD = { fontFamily:"monospace", fontSize:12, color:"#3555a0",
              background:"rgba(53,85,160,0.07)", padding:"1px 5px", borderRadius:3,
              whiteSpace:"nowrap" };
            const KBD = { background:"#e8eaf0", border:"1px solid #c4c8d6", borderRadius:3,
              padding:"1px 6px", fontFamily:"monospace", fontSize:12, color:"#2a2d3a" };
            const Row = ({ic, children, last}) => (
              <div style={{ display:"flex", gap:12, padding:"10px 0",
                borderBottom: last ? "none" : "1px solid #edf0f9", alignItems:"flex-start" }}>
                {ic}
                <p style={BODY}>{children}</p>
              </div>
            );
            return (
              <>
                {/* ── Spec link ── */}
                <div style={{ display:"flex", alignItems:"center", justifyContent:"space-between",
                  gap:16, background:"transparent", border:"1px solid #dde0ee",
                  borderRadius:12, padding:"18px 24px", flexWrap:"wrap" }}>
                  <div>
                    <p style={{ fontSize:13, fontWeight:600, color:"#02060d", margin:"0 0 3px",
                      fontFamily:"'Red Hat Text',sans-serif" }}>SideNav — Component Spec</p>
                    <p style={{ fontSize:12, color:"#8890b0", margin:0,
                      fontFamily:"'Red Hat Text',sans-serif" }}>
                      Tokens · anatomy · states · keyboard · ARIA · screen reader strings · Figma gaps
                    </p>
                  </div>
                  <a href="https://helloimjolopez-collab.github.io/pathwaytokens/SideNav-spec.md"
                    target="_blank" rel="noopener"
                    style={{ display:"inline-flex", alignItems:"center", gap:7,
                      padding:"9px 18px", borderRadius:8, background:"#3555a0",
                      color:"#fff", fontSize:13, fontWeight:600, textDecoration:"none",
                      fontFamily:"'Red Hat Text',sans-serif", whiteSpace:"nowrap",
                      flexShrink:0 }}>
                    View full spec →
                  </a>
                </div>

                {/* ── State Logic ── */}
                <section>
                  <p style={SH}>State Logic</p>
                  <div style={CARD}>
                    <p style={{...SUB, marginBottom:16}}>Click nav items to cycle through states in the demo above.</p>
                    {[
                      { label:"Base",                      fill:T.fill.navBase,   stripe:false, desc:"Resting — Fill/Contextual/NavItem/Base" },
                      { label:"Hover",                     fill:T.fill.navHover,  stripe:false, desc:"Fill/Contextual/NavItem/Hover" },
                      { label:"Active destination",        fill:T.fill.navActive, stripe:true,  desc:"Active fill + Icon/Contextual/NavItem/Active + indicator stripe" },
                      { label:"Trail — grouper expanded",  fill:T.fill.navTrail,  stripe:false, desc:"Any expanded grouper — Trail fill, Text/Active, Icon/Base, no stripe" },
                      { label:"Trail — grouper collapsed", fill:T.fill.navActive, stripe:true,  desc:"Collapsed grouper with active child — Active fill + stripe" },
                    ].map(({ label, fill, stripe, desc }, idx, arr) => (
                      <div key={label} style={{ display:"flex", alignItems:"center", gap:16,
                        padding:"11px 0", borderBottom: idx < arr.length-1 ? `1px solid ${T.fill.infoSubtle}` : "none" }}>
                        <div style={{ display:"flex", alignItems:"center", gap:4, flexShrink:0 }}>
                          <div style={{ width:4, height:24, borderRadius:"0 4px 4px 0",
                            backgroundColor: stripe ? T.indicator : "#e4e6ef" }} />
                          <div style={{ width:96, height:24, borderRadius:5, backgroundColor:fill,
                            border:"1px solid rgba(0,0,0,0.07)", flexShrink:0 }} />
                        </div>
                        <div style={{ minWidth:0 }}>
                          <p style={{ fontWeight:600, fontSize:13, color:"#2a2d3a", margin:"0 0 2px",
                            fontFamily:"'Red Hat Text',sans-serif" }}>{label}</p>
                          <p style={{...SUB, margin:0}}>{desc}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>

                {/* ── Token & Layout Reference ── */}
                <section>
                  <p style={SH}>Token &amp; Layout Reference</p>
                  <div style={CARD}>
                    <p style={{...SUB, marginBottom:16}}>
                      Primitive names are not surfaced by the <span style={CD}>get_variable_defs</span> Figma MCP tool — it resolves alias chains to final hex values only.
                      Rows marked <strong>no token</strong> have no semantic spacing tokens in Figma.
                    </p>
                    <div style={{ overflowX:"auto" }}>
                      <table style={{ width:"100%", borderCollapse:"collapse",
                        fontFamily:"'Red Hat Text',sans-serif", minWidth:680 }}>
                        <thead>
                          <tr>
                            {["Category","Semantic Token","Primitive","Value","Role"].map(h => (
                              <th key={h} style={{ textAlign:"left", padding:"8px 12px",
                                background:"#f4f5f8", fontWeight:700, fontSize:11,
                                color:"#8890b0", textTransform:"uppercase", letterSpacing:"0.06em",
                                borderBottom:"2px solid #e4e6f0", whiteSpace:"nowrap" }}>{h}</th>
                            ))}
                          </tr>
                        </thead>
                        <tbody>
                          {TOKEN_ROWS.map(({ cat, semantic, prim, value, role }) => {
                            const isWarn = cat.startsWith("⚠");
                            const isGood = cat.startsWith("✓");
                            const rowBg = isWarn ? "rgba(245,158,11,0.04)" : isGood ? "rgba(34,197,94,0.03)" : "transparent";
                            return (
                              <tr key={semantic} style={{ backgroundColor:rowBg }}>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color: isWarn ? "#b07800" : isGood ? "#166534" : "#777",
                                  whiteSpace:"nowrap", verticalAlign:"top" }}>{cat}</td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color: isWarn ? "#b07800" : isGood ? "#166534" : "#3555a0",
                                  verticalAlign:"top" }}>{semantic}</td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color:"#999", verticalAlign:"top" }}>{prim}</td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontFamily:"monospace", fontSize:12, color:"#333", verticalAlign:"top",
                                  whiteSpace:"nowrap" }}>
                                  <div style={{ display:"flex", alignItems:"center", gap:7 }}>
                                    {value.startsWith("#") && (
                                      <div style={{ width:13, height:13, borderRadius:3, flexShrink:0,
                                        backgroundColor:value, border:"1px solid rgba(0,0,0,0.1)" }} />
                                    )}
                                    {value}
                                  </div>
                                </td>
                                <td style={{ padding:"8px 12px", borderBottom:"1px solid #f0f1f4",
                                  fontSize:12, color:"#666", verticalAlign:"top" }}>{role}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </section>

                {/* ── Typography Token ── */}
                <section>
                  <p style={SH}>Typography Token</p>
                  <div style={{...CARD, maxWidth:620}}>
                    <div style={{ marginBottom:16, display:"flex", alignItems:"baseline",
                      gap:10, flexWrap:"wrap" }}>
                      <span style={{ fontFamily:"monospace", fontSize:13, color:"#3555a0",
                        background:"rgba(53,85,160,0.08)", padding:"3px 10px", borderRadius:4 }}>
                        Label/Menu/L/Medium
                      </span>
                      <span style={{...SUB}}>— all nesting levels, no size variation</span>
                    </div>
                    {[
                      ["--label/menu/l/medium/fontfamily",    "'Red Hat Text', sans-serif"],
                      ["--label/menu/l/medium/fontweight",    "500 (Medium)"],
                      ["--label/menu/l/medium/fontsize",      "16px"],
                      ["--label/menu/l/medium/lineheight",    "22px"],
                      ["--label/menu/l/medium/letterspacing", "0px"],
                    ].map(([varName, val], i, arr) => (
                      <div key={varName} style={{ display:"flex", alignItems:"baseline",
                        gap:16, padding:"9px 0",
                        borderBottom: i < arr.length-1 ? "1px solid #edf0f9" : "none",
                        flexWrap:"wrap" }}>
                        <code style={{ fontFamily:"monospace", fontSize:12, color:"#3555a0",
                          flexShrink:0 }}>{varName}</code>
                        <span style={{ fontSize:13, color:"#4b4b4b",
                          fontFamily:"'Red Hat Text',sans-serif" }}>{val}</span>
                      </div>
                    ))}
                  </div>
                </section>

              </>
            );
          })()}

        </div>{/* end annotations zone */}
      </div>{/* end right column */}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
